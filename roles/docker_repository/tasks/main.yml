- name: create a new repository about images
  community.docker.docker_container:
    name: local_registry_cache
    image: registry:2
    state: started
    restart_policy: always
    ports:
      - "5000:5000"
    volumes:
      - /home/lonelyhorse/docker_registry_data:/var/lib/registry #镜像源的储存地址
    env:
      PROXY_REMOTEURL: "https://registry-1.docker.io" 